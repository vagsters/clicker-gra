<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Clicker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="container">
    <h1>Offline Clicker</h1>
    <div class="stats">
      <div>Gold: <span id="gold">0</span></div>
      <div>Per Click: <span id="perClick">1</span></div>
      <div>Per Second: <span id="perSecond">0</span></div>
    </div>
    <button id="clickBtn" class="main-btn">Click!</button>
    <h2>Upgrades</h2>
    <div id="upgrades" class="upgrades"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
